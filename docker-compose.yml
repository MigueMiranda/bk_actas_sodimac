version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: actas_sodimac
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Sodimac25*
      POSTGRES_DB: actas_sodimac
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_sodimac
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mail.com
      PGADMIN_DEFAULT_PASSWORD: Sodimac25*
    ports:
      - "5050:80"

  bk_actas_sodimac:
    build: .
    container_name: bk_actas_sodimac_app # Dale un nombre único a tu contenedor para evitar confusiones.
    # command: npm start # 💡 Si tu Dockerfile no define un comando de inicio por defecto (CMD o ENTRYPOINT) o quieres sobrescribirlo, puedes especificarlo aquí.
    environment:
      # Pasa las variables de entorno que tu aplicación de Node.js necesita.
      # Asegúrate de que los nombres de las variables aquí coincidan con los que usas en tu código (ej. process.env.DATABASE_URL).
      DATABASE_URL: postgres://admin:Sodimac25*@postgres:5432/actas_sodimac # ✅ 'postgres' es el nombre del servicio de la BD en Docker Compose.
      EMAIL_USER: tu_correo@office365.com # Reemplaza con tu usuario de correo.
      EMAIL_PASS: tu_contraseña_o_app_password # Reemplaza con tu contraseña o contraseña de aplicación.
      PORT: 3000 # ✅ Asegúrate de que tu aplicación Express en `index.js` esté escuchando en este puerto (app.listen(3000, ...)).
    ports:
      - "3000:3000" # ✅ **CRÍTICO:** Mapea el puerto 3000 de tu máquina host al puerto 3000 dentro del contenedor.
    depends_on:
      - postgres # ✅ Asegura que el servicio `postgres` se inicie antes que tu backend, ya que el backend depende de la base de datos.
    volumes:
      - .:/app # ✅ Mapea tu código fuente local (directorio actual '.') al directorio '/app' dentro del contenedor. Útil para desarrollo con Nodemon.
      - /app/node_modules # ✅ **IMPORTANTE:** Esto excluye la carpeta `node_modules` del mapeo anterior para usar las dependencias instaladas dentro del contenedor, no las de tu host.
    restart: unless-stopped # ✨ Buena práctica: el contenedor intentará reiniciarse automáticamente a menos que lo detengas manualmente.


volumes:
  postgres_data:
